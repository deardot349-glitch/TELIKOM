<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Товар — Telikom</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">TELI<span>KOM</span></a>
    <div class="nav-links">
      <a href="index.html">Головна</a>
      <a href="catalog.html" class="active">Каталог</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="btn btn-ghost btn-sm">
        🛒 <div class="cart-icon-wrap" style="position:relative">Кошик <span class="cart-badge" style="display:none">0</span></div>
      </a>
      <button class="nav-hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="container"><div class="nav-mobile">
    <a href="index.html">Головна</a>
    <a href="catalog.html">Каталог</a>
    <a href="cart.html">🛒 Кошик</a>
  </div></div>
</nav>

<div class="container">
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">Головна</a>
    <span>›</span>
    <a href="catalog.html">Каталог</a>
    <span>›</span>
    <span id="bc-name">Товар</span>
  </div>
</div>

<div class="container section-sm" id="product-container">
  <div style="text-align:center;padding:80px">
    <div style="font-size:2rem;margin-bottom:12px">⏳</div>
    <p>Завантаження...</p>
  </div>
</div>

<!-- SIMILAR -->
<section class="section-sm" id="similar-section" style="display:none">
  <div class="container">
    <div class="section-header">
      <div class="section-label">Вам може сподобатись</div>
      <h2>Схожі товари</h2>
    </div>
    <div class="products-grid" id="similar-grid"></div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="padding-top:0;border-top:none">
      <a href="index.html" style="font-family:var(--font-head);font-weight:800;color:var(--accent)">TELIKOM</a>
      <p style="color:var(--muted);font-size:.82rem">© 2025 Telikom. Всі права захищені.</p>
    </div>
  </div>
</footer>

<script src="app.js"></script>
<script>
  const id = getParam('id');
  const product = PRODUCTS.find(p => p.id === id);

  if (!product) {
    document.getElementById('product-container').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">😕</div>
        <h3>Товар не знайдено</h3>
        <p>Можливо, він був видалений або посилання невірне</p>
        <a href="catalog.html" class="btn btn-primary" style="margin-top:20px">До каталогу</a>
      </div>`;
  } else {
    document.title = `${product.name} — Telikom`;
    document.getElementById('bc-name').textContent = product.name;

    const badgeMap = { new: ['badge-new', 'НОВИНКА'], sale: ['badge-sale', 'АКЦІЯ'], hit: ['badge-hit', 'ХІТ'] };
    const badge = product.badge ? `<div class="product-badge ${badgeMap[product.badge][0]}">${badgeMap[product.badge][1]}</div>` : '';
    const saveAmt = product.oldPrice ? product.oldPrice - product.price : 0;

    const specsRows = Object.entries(product.specs).map(([k, v]) =>
      `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

    document.getElementById('product-container').innerHTML = `
      <div class="product-page-grid">
        <!-- Gallery -->
        <div>
          <div class="product-gallery" id="main-img" style="font-size:8rem;position:relative;min-height:400px">
            ${badge}
            ${product.emoji}
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            ${[1,2,3].map(i => `<div style="width:80px;height:80px;background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:2rem;opacity:${i===1?'1':'.4'}" onclick="this.parentElement.querySelectorAll('div').forEach(d=>d.style.opacity='.4'); this.style.opacity='1'">${product.emoji}</div>`).join('')}
          </div>
        </div>

        <!-- Info -->
        <div>
          <div class="product-brand" style="margin-bottom:6px">${product.brand}</div>
          <h1>${product.name}</h1>
          <div class="product-meta">
            <div class="product-rating" style="font-size:.95rem">${renderStars(product.rating)} ${product.rating} <span style="color:var(--muted)">(${product.reviews} відгуків)</span></div>
            <div class="product-avail" style="font-size:.85rem;color:${product.inStock ? 'var(--success)' : 'var(--error)'}">
              ${product.inStock ? '● В наявності' : '● Немає в наявності'}
            </div>
          </div>

          <div style="margin-bottom:24px">
            <div style="display:flex;align-items:baseline;gap:16px;flex-wrap:wrap">
              <div class="product-price-big">${formatPrice(product.price)}</div>
              ${product.oldPrice ? `<div class="product-price-old-big">${formatPrice(product.oldPrice)}</div>` : ''}
              ${saveAmt ? `<div class="product-price-save">Економія ${formatPrice(saveAmt)}</div>` : ''}
            </div>
          </div>

          <div style="margin-bottom:24px">
            <div style="font-size:.85rem;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:.04em">КІЛЬКІСТЬ</div>
            <div class="qty-control">
              <button onclick="changeQty(-1)">−</button>
              <input type="number" id="qty-input" value="1" min="1" max="99">
              <button onclick="changeQty(1)">+</button>
            </div>
          </div>

          <div class="add-cart-row">
            <button class="btn btn-primary btn-lg" style="flex:1" onclick="addToCart()" ${!product.inStock ? 'disabled style="opacity:.5"' : ''}>
              🛒 Додати до кошика
            </button>
            <a href="cart.html" class="btn btn-ghost btn-lg" id="go-cart" style="display:none">Перейти до кошика →</a>
          </div>

          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px">
            <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;font-size:.8rem">
              <div style="font-size:1.4rem;margin-bottom:4px">🚚</div>
              <div style="color:var(--muted)">Доставка</div>
              <div style="font-weight:700;color:var(--text);font-size:.85rem">1–2 дні</div>
            </div>
            <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;font-size:.8rem">
              <div style="font-size:1.4rem;margin-bottom:4px">🛡️</div>
              <div style="color:var(--muted)">Гарантія</div>
              <div style="font-weight:700;color:var(--text);font-size:.85rem">${product.specs['Гарантія'] || '12 міс'}</div>
            </div>
            <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;font-size:.8rem">
              <div style="font-size:1.4rem;margin-bottom:4px">🔄</div>
              <div style="color:var(--muted)">Повернення</div>
              <div style="font-weight:700;color:var(--text);font-size:.85rem">14 днів</div>
            </div>
          </div>
        </div>
      </div>

      <!-- TABS -->
      <div style="margin-top:60px">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('desc', this)">Опис</button>
          <button class="tab-btn" onclick="switchTab('specs', this)">Характеристики</button>
          <button class="tab-btn" onclick="switchTab('warranty', this)">Гарантія</button>
        </div>
        <div class="tab-panel active" id="tab-desc">
          <p style="font-size:1rem;line-height:1.8;color:var(--muted);max-width:720px">${product.description}</p>
        </div>
        <div class="tab-panel" id="tab-specs">
          <table class="specs-table">
            ${specsRows}
          </table>
        </div>
        <div class="tab-panel" id="tab-warranty">
          <div style="max-width:640px">
            <h4 style="margin-bottom:16px">Умови гарантії</h4>
            <p style="margin-bottom:12px">Гарантійний термін: <strong style="color:var(--accent)">${product.specs['Гарантія'] || '12 місяців'}</strong></p>
            <p style="margin-bottom:12px">Гарантія поширюється на виробничі дефекти та несправності, що виникли в процесі нормальної експлуатації.</p>
            <p>При настанні гарантійного випадку зверніться до нас за телефоном або email, надавши фото/відео дефекту та чек замовлення.</p>
          </div>
        </div>
      </div>
    `;

    // Similar products
    const similar = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
    if (similar.length) {
      document.getElementById('similar-section').style.display = 'block';
      document.getElementById('similar-grid').innerHTML = similar.map(productCard).join('');
    }
  }

  function changeQty(delta) {
    const inp = document.getElementById('qty-input');
    if (!inp) return;
    inp.value = Math.max(1, +inp.value + delta);
  }

  function addToCart() {
    const qty = +document.getElementById('qty-input').value || 1;
    Cart.add(product.id, qty);
    document.getElementById('go-cart').style.display = 'inline-flex';
  }

  function switchTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
  }
</script>
</body>
</html>
